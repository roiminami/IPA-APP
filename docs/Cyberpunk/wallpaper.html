<!DOCTYPE html>
<html lang="en" class="no-js">

<head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Some WebGL experiments with raindrop effects" />
	<link rel="stylesheet" type="text/css" href="css/normalize.css" />
	<link rel="stylesheet" type="text/css" href="css/demo.css" />
    <style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background-color: #0a0a12; 
		}

		.slideshow, .container {
			position: fixed;
			top: 0;
			left: 0;
			width: 100vw !important;
			height: 100vh !important;
			overflow: hidden;
		}

		#container, #myCanvas, #imgif, .img {
			position: absolute;
			top: 0;
			left: 0;
			width: 100% !important;
			height: 100% !important;
			object-fit: cover; 
		}
	</style>
</head>

<body class="demo-1">

	<div id="loadingMask" style="position: fixed; inset: 0; background-color: #0a0a12; z-index: 999999; transition: opacity 0.4s ease-out; pointer-events: none;"></div>

	<div class="slideshow">
		<canvas id="container" style="position:absolute"></canvas>
		<div class="slide" id="main" data-weather="rain"></div>
		<nav class="slideshow__nav">				
			<a class="nav-item" href="#main"></a>			
		</nav>
	</div>
	
	<div class="container">		   
		<img class="img" id="imgif" alt="logo" src="img/main.png" />
		<canvas class="img" id='myCanvas'></canvas>			
		<p class="nosupport">Sorry, but your browser does not support WebGL!</p>
	</div>
			
	<script src="js/time.js"></script>
	<script src="js/index.js"></script>

	<script>
		// ⚡ 监听整个页面所有资源（大图、水滴纹理、WebGL上下文）彻底就绪的事件
		window.addEventListener('load', () => {
			// 给 WebGL 渲染出第一帧留出 250 毫秒的黄金缓冲期
			setTimeout(() => {
				const mask = document.getElementById('loadingMask');
				if (mask) {
					mask.style.opacity = '0'; // 优雅淡出
					setTimeout(() => mask.remove(), 400); // 动画结束后销毁，释放内存
				}
			}, 250);
		});

		let resizeTimer;
		window.addEventListener('resize', () => {
			clearTimeout(resizeTimer);
			resizeTimer = setTimeout(() => {
				window.location.reload();
			}, 300);
		});
	</script>
</body>
</html>
