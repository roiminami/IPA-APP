<!DOCTYPE html>
<html lang="en" class="no-js">

<head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Some WebGL experiments with raindrop effects" />
	<link rel="stylesheet" type="text/css" href="css/normalize.css" />
	<link rel="stylesheet" type="text/css" href="css/demo.css" />
    <style>
		/* ⚡ 核心修复：防止图片未初始化时拉伸或过大闪烁 */
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background-color: #0a0a12; /* 预设暗色背景，防止刷新时白闪 */
		}

		/* 强行让容器固定为视口大小 */
		.slideshow, .container {
			position: fixed;
			top: 0;
			left: 0;
			width: 100vw !important;
			height: 100vh !important;
			overflow: hidden;
		}

		/* 强行让所有画布和底图在加载瞬间保持 100% 填充且比例正确 */
		#container, #myCanvas, #imgif, .img {
			position: absolute;
			top: 0;
			left: 0;
			width: 100% !important;
			height: 100% !important;
			object-fit: cover; /* 核心：保持比例裁切填充，不随原图大小膨胀 */
		}
	</style>
</head>

<body class="demo-1">
	<div class="slideshow">
		<canvas id="container"></canvas>
		<div class="slide" id="main" data-weather="rain"></div>
		<nav class="slideshow__nav">				
			<a class="nav-item" href="#main"></a>			
		</nav>
	</div>

	<div class="container">		   
		<img class="img" id="imgif" alt="logo" src="img/main.png" />
		<canvas class="img" id='myCanvas'></canvas>			
		<p class="nosupport">Sorry, but your browser does not support WebGL!</p>
	</div>
			
	<script src="js/time.js"></script>
	<script src="js/index.js"></script>

	<script>
		let resizeTimer;
		window.addEventListener('resize', () => {
			// 如果用户还在持续拖拽缩放，就清除上一次的定时器
			clearTimeout(resizeTimer);
			
			// 当用户停止拖拽 300 毫秒后，再执行刷新，保证丝滑
			resizeTimer = setTimeout(() => {
				window.location.reload();
			}, 300);
		});
	</script>
</body>
</html>
