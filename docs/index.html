<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>南式TOEIC鬼特訓 - Central Console (Canvas的奇妙冒险)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="config.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&family=Noto+Sans+SC:wght=400;500;700&family=Noto+Sans+JP:wght=400;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans SC', 'Noto Sans JP', sans-serif;
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Canvas 背景画布完全置于底层，并允许穿透点击 */
        #display {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            pointer-events: none;
        }

        /* 前端 UI 容器置于上层，并保持半透明毛玻璃质感 */
        .ui-container {
            position: relative;
            z-index: 10;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>

<body class="text-slate-200 min-h-screen flex flex-col antialiased">

    <canvas id="cvs" class="hidden" width="1980" height="1080"></canvas>
    <canvas id="screenImage" class="hidden" width="234" height="357"></canvas>
    <canvas id="rili" class="hidden" width="600" height="600"></canvas>
    
    <canvas id="display"></canvas>

    <div class="ui-container flex-1 flex flex-col min-h-screen">
        
        <header class="border-b border-slate-800/60 bg-slate-950/60 backdrop-blur-md sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center text-white font-black text-lg shadow-lg shadow-amber-500/20">
                        南
                    </div>
                    <div>
                        <h1 class="text-base font-bold text-white tracking-tight">南式TOEIC鬼特訓</h1>
                        <p class="text-[10px] text-amber-500 font-semibold tracking-wider uppercase">UNIT CONTROLLER</p>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <div class="text-xs text-slate-400 font-medium hidden md:flex items-center space-x-1">
                        <span>访问群主博客：</span>
                        <a href="https://www.minami.ac.cn/" target="_blank" class="text-amber-400 font-bold hover:text-amber-300 hover:underline inline-flex items-center space-x-0.5">
                            <span>minami.ac.cn</span>
                            <i data-lucide="external-link" class="w-3 h-3 inline"></i>
                        </a>
                    </div>
                    <span class="text-xs font-mono text-slate-500 hidden sm:inline" id="global-counter-txt">Total: -- Units</span>
                    <div class="text-xs font-bold text-amber-400 bg-amber-950/40 px-3 py-1.5 rounded-xl border border-amber-500/30 flex items-center space-x-1.5 shrink-0">
                        <span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span>
                        <span>群主持续更新中 • 引擎正常</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col gap-6">
            
            <section class="relative group">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500 group-focus-within:text-amber-500 transition-colors">
                    <i data-lucide="search" class="w-5 h-5"></i>
                </div>
                <input 
                    type="text" 
                    id="searchConsoleInput" 
                    oninput="filterToeicModules()" 
                    placeholder="快速检索：输入单元编号或词义范围（如 '1'、'11-20'）直达目标特训..." 
                    class="w-full pl-11 pr-4 py-3.5 bg-slate-900/50 backdrop-blur-sm rounded-xl border border-slate-800 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-amber-500 focus:ring-4 focus:ring-amber-500/10 transition-all shadow-xl"
                >
            </section>

            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4" id="modulesGridContainer">
                </div>

            <div id="search-empty-state" class="hidden text-center py-16 bg-slate-900/50 backdrop-blur-sm rounded-2xl border border-slate-800 border-dashed space-y-2">
                <div class="w-10 h-10 bg-slate-800 text-slate-500 rounded-full flex items-center justify-center mx-auto">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                </div>
                <h4 class="text-xs font-bold text-slate-400">未找到相关特训单元</h4>
                <p class="text-[11px] text-slate-500">请尝试更换筛选关键字。</p>
            </div>

        </main>

        <footer class="border-t border-slate-900/80 bg-slate-950/70 backdrop-blur-sm py-4 text-center text-[10px] text-slate-500 tracking-wide font-mono mt-auto">
            Southern Ghost TOEIC Platform Engine • Powered by config.js & Canvas Adventure
        </footer>
    </div>

    <script>
        var cvs = document.getElementById("cvs");
        var ctx = cvs.getContext("2d");

        var display = document.getElementById("display");
        var displayCtx = display.getContext("2d");

        var screenImage = document.getElementById("screenImage");
        var screenImageCtx = screenImage.getContext("2d");

        var rili = document.getElementById("rili");
        var riliCtx = rili.getContext("2d");

        // 1. 原日历高精度生成树逻辑
        function drawRili() {
            riliCtx.clearRect(0, 0, 600, 600);
            var date = new Date();
            var year = date.getYear();
            var mouth = date.getMonth();
            var today = date.getDate();
            var week = date.getDay();

            var cardSize = 40;

            var array_three = [4, 6, 9, 11];
            var array_threeone = [1, 3, 5, 7, 8, 10, 12];
            var array_week = ["SUN", "MON", "TUES", "WED", "THUR", "FRI", "SAT"];

            var firstDraw; 
            var wIdx = today % 7;

            if (week >= wIdx) {
                firstDraw = week - wIdx + 1;
            } else {
                firstDraw = week - wIdx + 8;
            }

            var dayIndex = 1;
            var countDay = 30;

            if (array_three.indexOf(mouth + 1) > -1) {
                countDay = 30;
            } else if (array_threeone.indexOf(mouth + 1) > -1) {
                countDay = 31;
            } else {
                if (year % 4 == 0 && year % 100 != 0 || year % 400 == 0)
                    countDay = 29;
                else
                    countDay = 28;
            }

            var row = 6;
            if (7 - firstDraw + 7 * 4 < countDay) { 
                row = 7;
            }

            function drawTodaybg(i, j) {
                riliCtx.save();
                riliCtx.beginPath();
                riliCtx.strokeStyle = "#900";
                riliCtx.arc(45 + i * cardSize * 1.7 + cardSize / 1.18, 50 + j * cardSize + cardSize / 2, cardSize / 2 - 10, - Math.PI, Math.PI * 1);
                riliCtx.stroke();
                riliCtx.closePath();

                riliCtx.beginPath();
                riliCtx.arc(45 + i * cardSize * 1.7 + cardSize / 1.18, 50 + j * cardSize + cardSize / 2, cardSize / 2 - 9, - Math.PI, Math.PI * 0.9);
                riliCtx.stroke();
                riliCtx.closePath();

                riliCtx.beginPath();
                riliCtx.arc(45 + i * cardSize * 1.7 + cardSize / 1.18, 50 + j * cardSize + cardSize / 2, cardSize / 2 - 8, - Math.PI, Math.PI * 0.8);
                riliCtx.stroke();
                riliCtx.closePath();

                riliCtx.beginPath();
                riliCtx.arc(45 + i * cardSize * 1.7 + cardSize / 1.18, 50 + j * cardSize + cardSize / 2, cardSize / 2 - 7, - Math.PI, Math.PI * 0.7);
                riliCtx.stroke();
                riliCtx.closePath();

                riliCtx.beginPath();
                riliCtx.arc(45 + i * cardSize * 1.7 + cardSize / 1.18, 50 + j * cardSize + cardSize / 2, cardSize / 2 - 6, - Math.PI, Math.PI * 0.6);
                riliCtx.stroke();
                riliCtx.closePath();
                riliCtx.restore();
            }
            
            var isNum = /^\d+(\d+)?$/;

            function drawDate(txt, i, j) {
                riliCtx.textAlign = "center";
                riliCtx.fillStyle = "rgb(69,68,84)";
                riliCtx.font = (cardSize / 1.5) + 'px Impact';
                var yOffest = 3;

                if ((j == 0 || j == 6) && isNum.test(txt)) {
                    riliCtx.fillStyle = "#900";
                }

                riliCtx.fillText(txt.toString(), 45 + j * cardSize * 1.7 + cardSize / 1.18, 50 + i * cardSize + cardSize / 3 * 2 + yOffest);

                if (txt == today) {
                    drawTodaybg(j, i);
                }
            }

            riliCtx.fillStyle = "rgb(69,68,84)";
            riliCtx.font = "900 26pt SimHei";
            riliCtx.textAlign = "center";
            var monthCN = ["一","二","三","四","五","六","七","八","九","十","十一","十二"];
            riliCtx.scale(1.1,1);
            riliCtx.fillText(monthCN[mouth] + "月", 260, 32);
            riliCtx.resetTransform();
            
            riliCtx.font = "20pt SimHei";
            riliCtx.textAlign = "end";
            riliCtx.fillText(today + "日",520,38);

            for (var i = 0; i < row; i++) {
                for (var j = 0; j < 7; j++) {
                    riliCtx.strokeRect(45 + j * cardSize * 1.70, 50 + i * cardSize, cardSize * 1.70, cardSize);
                }
            }

            dayIndex = 1;

            for (var i = 0; i < row; i++) { 
                for (var j = 0; j < 7; j++) {
                    if (i == 0) { 
                        drawDate(array_week[j], i, j);
                        continue;
                    }
                    if (i == 1 && j < firstDraw) { 
                        continue;
                    }
                    if (dayIndex > countDay) { 
                        break;
                    }
                    drawDate(dayIndex++, i, j);
                }
            }
        }

        var riliInterval = setInterval(drawRili, 3600000);
        drawRili();

        // 2. 静态图片素材加载
        var screenMask = new Image(); screenMask.src = "wallpaper/Screenmask.png";
        var screen = new Image(); screen.src = "wallpaper/screen.png";

        var iv = setInterval(() => {
            if (screen.complete && screenMask.complete) {
                screenImageCtx.drawImage(screen, -1041, -210, 1280, 720);
                screenImageCtx.globalCompositeOperation = "destination-atop";
                screenImageCtx.drawImage(screenMask, 0, 0);
                screenImageCtx.globalCompositeOperation = "source-over";
                clearInterval(iv);
            }
        }, 14);

        // 自适应拉伸
        window.onresize = function () {
            if (window.innerWidth / window.innerHeight > 1.8333333333333) {
                display.width = window.innerWidth;
                display.height = window.innerWidth / 1980 * 1080;
                window.scrollTo(0, (window.innerHeight - 123) / 16);
            } else {
                display.width = window.innerHeight / 1080 * 1980;
                display.height = window.innerHeight;
            }
        }
        window.onresize();

        var bg = new Image(); bg.src = "wallpaper/bg.png";
        var mask = new Image(); mask.src = "wallpaper/mask.png";
        var light = new Image(); light.src = "wallpaper/light.png";
        var caidai = new Image(); caidai.src = "wallpaper/caidai.png";
        var two = new Image(); two.src = "wallpaper/22.png";
        var screenLight = new Image(); screenLight.src = "wallpaper/screenLight.png";
        var phoneLight = new Image(); phoneLight.src = "wallpaper/phoneLight.png";

        // 日语备考专属问候语 (全保留)
        var phoneText = JSON.parse("[{\"time\":0,\"text\":\"夜更かし厳禁！\"},{\"time\":6,\"text\":\"朝活の時間です！\"},{\"time\":8,\"text\":\"今日もコツコツ！\"},{\"time\":11,\"text\":\"単語の復習した？\"},{\"time\":13,\"text\":\"集中力キープ！\"},{\"time\":16,\"text\":\"もう一踏ん張り！\"},{\"time\":19,\"text\":\"今日の成果は？\"}]");

        var noRili = false;

        // 3. 壁纸引擎联动配置
        window.wallpaperPropertyListener = {
            applyUserProperties: function (properties) {
                if (properties.screenFile) {
                    if (properties.screenFile.value) {
                        screen.src = 'file:///' + properties.screenFile.value;
                        var iv1 = setInterval(() => {
                            if (screen.complete && screenMask.complete) {
                                screenImageCtx.clearRect(0, 0, 1000, 1000);
                                screenImageCtx.drawImage(screen, -1041, -210, 1280, 720);
                                screenImageCtx.globalCompositeOperation = "destination-atop";
                                screenImageCtx.drawImage(screenMask, 0, 0);
                                screenImageCtx.globalCompositeOperation = "source-over";
                                clearInterval(iv1);
                            }
                        }, 14);
                    }
                }
                if (properties.phoneText) {
                    if (properties.phoneText.value) {
                        phoneText = JSON.parse(properties.phoneText.value);
                    }
                }
                if (properties.disableRili) {
                    if (properties.disableRili.value) {
                        clearInterval(riliInterval);
                        noRili = true;
                    } else {
                        riliInterval = setInterval(drawRili, 3600000);
                        drawRili();
                        noRili = false;
                    }
                }
            }
        }

        function min(a, b) { return a > b ? b : a; }
        function max(a, b) { return a > b ? a : b; }

        var lightColor = { r: 0, g: 34, b: 77, a: 0 };
        var night = false;
        var debug = false;

        // 4. 精简后的核心动画循环渲染区
        function render() {
            ctx.clearRect(0, 0, 1980, 1080);
            ctx.drawImage(bg, 0, 0);
            ctx.drawImage(mask, 954, 99);

            ctx.fillStyle = "#97adbb";
            ctx.font = "32pt Impact";
            
            ctx.transform(1, 2.05 * (Math.PI / 180), 0, 1, 0, 0);
            var time = new Date();
            ctx.fillText((time.getHours() < 10 ? "0" : "") + time.getHours().toString() + ":" + (time.getMinutes() < 10 ? "0" : "") + time.getMinutes() + ":" + (time.getSeconds() < 10 ? "0" : "") + time.getSeconds().toString(), 725, 318);
            ctx.resetTransform();

            // 绘制日历
            if (!noRili) {
                ctx.transform(0.9645, 0, 0 * (Math.PI / 180), 0.96, 967, 100);
                ctx.rotate(6 * (Math.PI / 180));
                ctx.drawImage(rili, 0, 0);
                ctx.resetTransform();
            }

            ctx.globalCompositeOperation = "overlay";
            ctx.drawImage(light, 971, 197);
            ctx.globalCompositeOperation = "source-over";
            ctx.drawImage(caidai, 949, 25);
            ctx.drawImage(two, 1319, 345);

            // 夜间滤镜效果
            if (night && lightColor.a < 0.7) {
                lightColor.a += 0.005; lightColor.a = min(lightColor.a, 0.7);
            } else if (!night) {
                lightColor.a -= 0.005; lightColor.a = max(lightColor.a, 0.0);
            }

            if (lightColor.a > 0) {
                ctx.globalCompositeOperation = "hard-light";
                ctx.fillStyle = "rgba(" + lightColor.r + "," + lightColor.g + "," + lightColor.b + "," + lightColor.a + ")";
                ctx.fillRect(0, 0, 1980, 1080);
                ctx.globalCompositeOperation = "source-over";
                ctx.globalAlpha = lightColor.a / 0.7;
                ctx.drawImage(phoneLight, 860, 437);
                ctx.globalAlpha = 1;
            }

            ctx.drawImage(screenImage, 0, 0);
            if (lightColor.a > 0) {
                ctx.globalAlpha = lightColor.a / 0.7;
                ctx.drawImage(screenLight, 0, 0);
                ctx.globalAlpha = 1;
            }

            night = true;
            var greeting = "凌晨啦!";
            phoneText.forEach((v) => { if (time.getHours() >= v.time) { greeting = v.text; } });
            if (time.getHours() >= 6 && time.getHours() <= 18) { night = false; }
            night = debug ? !night : night;

            // 手机文字
            ctx.fillStyle = "#000"; ctx.font = "31.02pt SimHei";
            ctx.transform(1.0911, -35 * (Math.PI / 180), 0, 0.5868, 1132.94, 564.07);
            ctx.rotate(56.5 * (Math.PI / 180));
            ctx.textAlign = "center"; ctx.fillStyle = "#fff";
            ctx.fillText(greeting, 135, 100);
            ctx.textAlign = "start"; ctx.resetTransform();

            displayCtx.drawImage(cvs, 0, 0, display.width, display.height);
            window.requestAnimationFrame(render);
        }
        window.requestAnimationFrame(render);


        // ==========================================
        // 核心逻辑：TOEIC 控制台数据渲染区
        // ==========================================
        let localConfigRegistry = [];

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof toeicModulesConfig === 'undefined') {
                console.error("Router Core Error: 'toeicModulesConfig' missing.");
                return;
            }
            localConfigRegistry = [...toeicModulesConfig];
            renderConsoleGrid(localConfigRegistry);
        });

        function renderConsoleGrid(modulesList) {
            const container = document.getElementById('modulesGridContainer');
            const emptyState = document.getElementById('search-empty-state');
            const counterText = document.getElementById('global-counter-txt');
            
            container.innerHTML = '';
            counterText.textContent = `Total: ${toeicModulesConfig.length} Units`;

            if (modulesList.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            container.classList.remove('hidden');
            emptyState.classList.add('hidden');

            modulesList.forEach(mod => {
                const cardAnchor = document.createElement('a');
                cardAnchor.href = `test.html?unit=${mod.unit}`;
                cardAnchor.className = "bg-slate-900/60 backdrop-blur-md p-4 rounded-xl border border-slate-800 hover:border-amber-500 hover:bg-slate-800/80 active:scale-[0.98] transition-all flex items-center justify-between group shadow-lg";
                
                cardAnchor.innerHTML = `
                    <div class="flex flex-col min-w-0 pr-2">
                        <span class="text-[9px] font-mono text-amber-500 font-bold uppercase tracking-wider">UNIT ${String(mod.id).padStart(2, '0')}</span>
                        <span class="text-xs font-bold text-slate-200 group-hover:text-amber-400 transition-colors truncate mt-0.5">${mod.title}</span>
                    </div>
                    <div class="w-6 h-6 rounded-lg bg-slate-800 group-hover:bg-amber-500 flex items-center justify-center shrink-0 transition-colors">
                        <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-slate-400 group-hover:text-slate-950 transform group-hover:translate-x-0.5 transition-all"></i>
                    </div>
                `;
                container.appendChild(cardAnchor);
            });

            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }

        function filterToeicModules() {
            const query = document.getElementById('searchConsoleInput').value.trim().toLowerCase();
            if (!query) {
                renderConsoleGrid(localConfigRegistry);
                return;
            }
            const filtered = localConfigRegistry.filter(mod => {
                return String(mod.id) === query || mod.title.toLowerCase().includes(query);
            });
            renderConsoleGrid(filtered);
        }
    </script>
</body>

</html>
