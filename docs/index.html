<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南式応用情報速攻！科目B突破システム</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-bg: #f0f6ff;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-sub: #475569;
            --border: #e2e8f0;
            
            --radius-lg: 16px;
            --radius-md: 10px;
            
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            padding: 3rem 2rem; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        header { 
            text-align: center; 
            margin-bottom: 3rem; 
            width: 100%;
            max-width: 1200px;
        }
        h1 { 
            font-size: 2.2rem; 
            font-weight: 850; 
            color: #1e3a8a;
            letter-spacing: -0.03em;
            margin-bottom: 0.6rem;
        }
        .subtitle {
            font-size: 0.95rem;
            color: var(--text-sub);
            font-weight: 500;
        }

        .filter-section { 
            width: 100%; 
            max-width: 1200px; 
            margin-bottom: 1.5rem; 
            background: var(--card-bg);
            padding: 1.2rem 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .filter-label { 
            font-size: 0.85rem; 
            font-weight: 800; 
            color: #1e40af; 
            margin-bottom: 0.8rem; 
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .tag-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 0.6rem; 
            width: 100%; 
        }

        .tag-btn { 
            padding: 0.5rem 1.2rem; 
            border: 1px solid var(--border); 
            border-radius: 9999px; 
            background: white; 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: var(--text-sub); 
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: var(--shadow-sm);
        }
        .tag-btn:hover {
            border-color: var(--primary-light);
            color: var(--primary);
            background-color: var(--primary-bg);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .tag-btn.active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary); 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        main { 
            width: 100%; 
            max-width: 1200px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr)); 
            gap: 2rem; 
            margin-top: 1rem;
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg); 
            padding: 1.8rem; 
            box-shadow: var(--shadow-md);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            animation: fadeIn 0.35s ease-out;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-title { 
            font-size: 1.3rem; 
            font-weight: 850; 
            margin-bottom: 1.5rem; 
            color: #1e3a8a; 
            border-left: 4px solid var(--primary);
            padding-left: 0.7rem;
            line-height: 1.2;
        }

        .card-columns {
            display: flex;
            gap: 1.5rem;
        }
        .card-column {
            flex: 1;
            min-width: 0;
        }
        
        .column-header {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--text-sub);
            margin-bottom: 0.8rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        
        .list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .item { 
            background: #ffffff; 
            border: 1px solid var(--border); 
            padding: 0.8rem 1rem; 
            border-radius: var(--radius-md); 
            text-decoration: none; 
            color: var(--text-main); 
            font-size: 0.85rem; 
            font-weight: 700; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            border-left: 3px solid transparent;
        }
        .item:hover { 
            border-color: var(--primary-light); 
            border-left-color: var(--primary);
            color: var(--primary); 
            transform: translateX(3px);
            box-shadow: var(--shadow-md);
            background-color: var(--primary-bg);
        }

        .arrow-icon {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: var(--text-sub);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.2s ease, stroke 0.2s ease;
            flex-shrink: 0;
        }
        .item:hover .arrow-icon {
            stroke: var(--primary);
            transform: translateX(4px);
        }

        .badge { 
            font-size: 0.7rem; 
            background: #f1f5f9; 
            padding: 0.15rem 0.4rem; 
            border-radius: 6px; 
            color: var(--text-sub); 
            margin-left: 0.5rem;
            flex-shrink: 0;
            border: 1px solid #e2e8f0;
        }

        @media (max-width: 640px) {
            body { padding: 1.5rem 1rem; }
            main { grid-template-columns: 1fr; }
            .card-columns {
                flex-direction: column;
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>南式応用情報速攻！科目B</h1>
        <p class="subtitle">効率よく、スマートに過去問を突破しよう</p>
    </header>

    <div class="filter-section">
        <div class="filter-label">📅 年度から選ぶ</div>
        <div class="tag-container" id="year-tags"></div>
    </div>

    <div class="filter-section">
        <div class="filter-label">🏷️ 分野から選ぶ</div>
        <div class="tag-container" id="topic-tags"></div>
    </div>

    <main id="app-main"></main>

    <script src="config.js"></script>
    <script>
        const container = document.getElementById('app-main');
        const yearTags = document.getElementById('year-tags');
        const topicTags = document.getElementById('topic-tags');
        
        let selectedYear = 'all';
        let selectedTopic = 'all';

        const topics = ['問1 情報セキュリティ', '問2 経営戦略', '問5 ネットワーク', '問9 プロジェクトマネジメント', '問10 サービスマネジメント'];

        function getTopic(q) {
            if (q.id.includes('Q01') || q.title.includes('セキュリティ')) return '問1 情報セキュリティ';
            if (q.id.includes('Q02') || q.title.includes('経営')) return '問2 経営戦略';
            if (q.id.includes('Q05') || q.title.includes('ネットワーク')) return '問5 ネットワーク';
            if (q.id.includes('Q09') || q.title.includes('プロジェクト')) return '問9 プロジェクトマネジメント';
            if (q.id.includes('Q10') || q.title.includes('サービス')) return '問10 サービスマネジメント';
            return null;
        }

        // 🌟 元号（和暦）と「元年」を正確に西暦数値にシミュレートする関数
        function getAbsoluteYear(yearStr) {
            const match = yearStr.match(/(令和|平成)\s*([0-9元]+)年度?/);
            if (!match) return 0;
            const era = match[1];
            let numStr = match[2];
            let num = numStr === '元' ? 1 : parseInt(numStr, 10);
            
            if (era === '令和') {
                return 2018 + num; // 令和1年（元年）= 2019年, 令和7年 = 2025年
            } else if (era === '平成') {
                return 1988 + num; // 平成29年 = 2017年, 平成31年 = 2019年
            }
            return 0;
        }

        // 🌟 全キーを「本物の直近順」にソートする関数
        function getSortedKeys() {
            return Object.keys(EXAM_DATA).sort((a, b) => {
                const nameA = EXAM_DATA[a].yearName; 
                const nameB = EXAM_DATA[b].yearName; 
                
                const ya = getAbsoluteYear(cleanYearName(nameA));
                const yb = getAbsoluteYear(cleanYearName(nameB));
                
                if (ya !== yb) {
                    return yb - ya;
                }
                
                // 同じ年（例: 2019年）の場合は、令和を平成より優先
                const isRaiwaA = nameA.includes('令和');
                const isRaiwaB = nameB.includes('令和');
                if (isRaiwaA && !isRaiwaB) return -1;
                if (!isRaiwaA && isRaiwaB) return 1;

                // 秋期を春期より優先
                const isAutumnA = nameA.includes('秋');
                const isAutumnB = nameB.includes('秋');
                if (isAutumnA && !isAutumnB) return -1;
                if (!isAutumnA && isAutumnB) return 1;
                return 0;
            });
        }

        // 🌟 「令和◯年度」の純粋な年度文字列を抽出する関数
        function cleanYearName(name) {
            return name.replace(/(春期|秋期|春|秋).*$/, '').trim();
        }

        // 🌟 データを「年度」単位に確実にグループ化
        function getGroupedExams() {
            const groups = {};
            
            Object.keys(EXAM_DATA).forEach(key => {
                const data = EXAM_DATA[key];
                const name = data.yearName;
                const yearTitle = cleanYearName(name);
                const absoluteYear = getAbsoluteYear(yearTitle);
                
                const groupKey = key.replace(/_(Autumn|Spring)$/, '');
                
                if (!groups[groupKey]) {
                    groups[groupKey] = {
                        key: groupKey,
                        yearTitle: yearTitle,
                        absoluteYear: absoluteYear,
                        isRaiwa: yearTitle.includes('令和'),
                        autumn: null,
                        spring: null
                    };
                }
                
                if (key.endsWith('_Autumn')) {
                    groups[groupKey].autumn = { key: key, questions: data.questions };
                } else if (key.endsWith('_Spring')) {
                    groups[groupKey].spring = { key: key, questions: data.questions };
                }
            });
            
            // 年度の新しい順にソート
            return Object.values(groups).sort((a, b) => {
                if (b.absoluteYear !== a.absoluteYear) {
                    return b.absoluteYear - a.absoluteYear;
                }
                if (b.isRaiwa && !a.isRaiwa) return 1;
                if (!b.isRaiwa && a.isRaiwa) return -1;
                return 0;
            });
        }

        function initUI() {
            const uniqueYears = [];
            Object.keys(EXAM_DATA).forEach(key => {
                const name = EXAM_DATA[key].yearName;
                const yearPart = cleanYearName(name); 
                if (yearPart && !uniqueYears.includes(yearPart)) {
                    uniqueYears.push(yearPart);
                }
            });
            
            // 📅 「年度から選ぶ」タグバーも直近順に美しく並べ替え
            uniqueYears.sort((a, b) => {
                const ya = getAbsoluteYear(a);
                const yb = getAbsoluteYear(b);
                if (ya !== yb) return yb - ya;
                if (a.includes('令和') && b.includes('平成')) return -1;
                if (a.includes('平成') && b.includes('令和')) return 1;
                return 0;
            });

            // 年度タグ作成
            yearTags.innerHTML = `<button class="tag-btn active" data-type="year" data-val="all">全年度</button>`;
            uniqueYears.forEach(y => {
                yearTags.innerHTML += `<button class="tag-btn" data-type="year" data-val="${y}">${y}</button>`;
            });

            // 分野タグ作成
            topicTags.innerHTML = `<button class="tag-btn active" data-type="topic" data-val="all">全分野</button>`;
            topics.forEach(t => {
                topicTags.innerHTML += `<button class="tag-btn" data-type="topic" data-val="${t}">${t}</button>`;
            });

            document.querySelectorAll('.tag-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const type = e.target.dataset.type;
                    const val = e.target.dataset.val;
                    
                    if (type === 'year') {
                        selectedYear = val;
                        selectedTopic = 'all';
                        
                        document.querySelectorAll('[data-type="topic"]').forEach(b => b.classList.remove('active'));
                        document.querySelector('[data-type="topic"][data-val="all"]').classList.add('active');
                        
                        document.querySelectorAll('[data-type="year"]').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                    } else {
                        selectedTopic = val;
                        selectedYear = 'all';
                        
                        document.querySelectorAll('[data-type="year"]').forEach(b => b.classList.remove('active'));
                        document.querySelector('[data-type="year"][data-val="all"]').classList.add('active');
                        
                        document.querySelectorAll('[data-type="topic"]').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                    }
                    render();
                });
            });

            render();
        }

        function render() {
            container.innerHTML = '';
            const groupedExams = getGroupedExams();
            const arrowSvg = `<svg class="arrow-icon" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;

            if (selectedYear !== 'all') {
                const filtered = groupedExams.filter(g => g.yearTitle === selectedYear);
                
                filtered.forEach(g => {
                    const el = document.createElement('section');
                    el.className = 'card';
                    
                    let autumnHtml = '';
                    if (g.autumn && g.autumn.questions?.length) {
                        autumnHtml = `
                            <div class="card-column">
                                <div class="column-header">🍁 秋期試験</div>
                                <div class="list">
                                    ${g.autumn.questions.map(q => `<a class="item" href="test.html?year=${g.autumn.key}&question=${q.id}"><span>${q.title}</span>${arrowSvg}</a>`).join('')}
                                </div>
                            </div>
                        `;
                    }
                    
                    let springHtml = '';
                    if (g.spring && g.spring.questions?.length) {
                        springHtml = `
                            <div class="card-column">
                                <div class="column-header">🌸 春期試験</div>
                                <div class="list">
                                    ${g.spring.questions.map(q => `<a class="item" href="test.html?year=${g.spring.key}&question=${q.id}"><span>${q.title}</span>${arrowSvg}</a>`).join('')}
                                </div>
                            </div>
                        `;
                    }

                    el.innerHTML = `
                        <h2 class="card-title">📅 ${g.yearTitle}</h2>
                        <div class="card-columns">
                            ${autumnHtml}
                            ${springHtml}
                        </div>
                    `;
                    container.appendChild(el);
                });
            } else if (selectedTopic !== 'all') {
                const el = document.createElement('section');
                el.className = 'card';
                el.innerHTML = `<h2 class="card-title">🏷️ ${selectedTopic}</h2><div class="list" style="margin-top: 1rem;"></div>`;
                const list = el.querySelector('.list');
                
                const sortedYearsKeys = getSortedKeys();
                sortedYearsKeys.forEach(yKey => {
                    EXAM_DATA[yKey].questions?.forEach(q => {
                        if (getTopic(q) === selectedTopic) {
                            list.innerHTML += `<a class="item" href="test.html?year=${yKey}&question=${q.id}"><span>${q.title}</span><span style="display:flex; align-items:center;"><span class="badge">${EXAM_DATA[yKey].yearName}</span>${arrowSvg}</span></a>`;
                        }
                    });
                });
                container.appendChild(el);
            } else {
                groupedExams.forEach(g => {
                    const el = document.createElement('section');
                    el.className = 'card';
                    
                    let autumnHtml = '';
                    if (g.autumn && g.autumn.questions?.length) {
                        autumnHtml = `
                            <div class="card-column">
                                <div class="column-header">🍁 秋期試験</div>
                                <div class="list">
                                    ${g.autumn.questions.map(q => `<a class="item" href="test.html?year=${g.autumn.key}&question=${q.id}"><span>${q.title}</span>${arrowSvg}</a>`).join('')}
                                </div>
                            </div>
                        `;
                    }
                    
                    let springHtml = '';
                    if (g.spring && g.spring.questions?.length) {
                        springHtml = `
                            <div class="card-column">
                                <div class="column-header">🌸 春期試験</div>
                                <div class="list">
                                    ${g.spring.questions.map(q => `<a class="item" href="test.html?year=${g.spring.key}&question=${q.id}"><span>${q.title}</span>${arrowSvg}</a>`).join('')}
                                </div>
                            </div>
                        `;
                    }

                    el.innerHTML = `
                        <h2 class="card-title">📅 ${g.yearTitle}</h2>
                        <div class="card-columns">
                            ${autumnHtml}
                            ${springHtml}
                        </div>
                    `;
                    container.appendChild(el);
                });
            }
        }
        initUI();
    </script>
</body>
</html>
